<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2025 Live</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
}

.loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loading span {
  color: #00b3ff;
  font-size: 24px;
  letter-spacing: 5px;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

video {
  width: 100%;
  height: 100vh;
}
</style>
</head>

<body>

<div id="loading" class="loading">
  <span>LOADING...</span>
</div>

<video id="video" controls autoplay muted playsinline></video>

<script>
const video = document.getElementById('video');
const source = "https://vsd122.okcdn.ru/cmaf/15590177311487/sig/OltpbIfs8r8/expires/1777037154094/srcIp/47.31.76.122/urls/45.136.22.86/clientType/36/srcAg/CHROME/mid/14163207014399/get/hls_14163207014399.8ug_MYk2NvA.m3u8";

if (Hls.isSupported()) {
    const hls = new Hls({
        maxBufferLength: 30,
        maxMaxBufferLength: 60
    });

    hls.loadSource(source);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play();
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = source;
    video.addEventListener('loadedmetadata', function () {
        video.play();
    });
}

// Plyr UI
const player = new Plyr(video);

// Hide loader
video.addEventListener('playing', () => {
    document.getElementById('loading').style.display = 'none';
});

// Telegram popup
setTimeout(() => {
    if (confirm("Join Telegram for more live links?")) {
        window.open("https://t.me/cricmatchstream", "_blank");
    }
}, 5000);
</script>

</body>
</html>
</html>
